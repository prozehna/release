build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: golang-1.25
releases:
  latest:
    release:
      architecture: amd64
      channel: stable
      version: "4.21"
resources:
  '*':
    limits:
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: e2e-vpa
  steps:
    cluster_profile: aws
    test:
    - as: e2e-vpa
      cli: latest
      commands: make e2e-vpa-test
      from: src
      resources:
        requests:
          cpu: 100m
    workflow: ipi-aws
zz_generated_metadata:
  branch: main
  org: openshift
  repo: autoscale-tests
